body:
  text: 西晉月氏國三藏竺法護譯聞如是一時佛在舍衛國祇樹給孤獨園爾時諸四輩弟子天帝龍鬼神質諒神皆詣祇樹稽首佛足却就常位坐佛告諸弟子吾今所出經法所可教誡皆自各守其意念末世毒然之時四輩弟子若出家若居家修道皆狂醉衆色不復承用佛經法專愚自用便使吾道薄淡令世人謗訕吾道信是弟子慠慢所致鶖鷺子整衣服叉手一心聽佛説四輩經如是佛言若末世男子能出家除剃頭髮為道者第一去離愛欲志存大乘常當慈悲喜護為主去想行普念一切蜎飛蠕動之類視之如身無異不得妄起恚怒深入明度常以明度權便誘致曚冥使入無極以戒德除心穢病不得為世間之業能行此者便可出家名曰道士不可依恃吾法自以出家為信不專念道或能有下賤之人倚道自活無益一切而但出意説為人師主輕薄戲調不自撿察使尊法薄淡世人不信非吾出家弟子之法也佛言若有女人出家除髮為道以去愛欲當專精靜處不得與出家男子同廟止若行師受當有等類不得獨往稟受常當晚出早還不得妄出廟宿止但得教授女人不得教授男子所著衣服不得刻繒帛綵色苾芬不得輕言戲語不得貪財寶物戒行清淨名曰出家道人若輕言戲調未語預笑心志不寂意行穢濁惡口罵詈輕言不節不能靜處憍慢自大不自撿敕者雖復出家故是賤人非出家弟子也佛言若有男子心志繫道不能出家者在於愛欲之中當受持五戒月六齋第一孝順父母治家養子朝暮燒香然燈稽首三尊悔過十方恭敬四輩不得慢輕自大去離慳貪常以至誠不得欺殆世人不得與世間人妻婦坐起同席住行相隨同室異床除去四事以四等心普視一切老者若父若母少者若弟若子恆以明度法藥洗除衆病不得妄瞋恚罵詈常以無極方便誘解世人使入大乘不得為新學者説深經奧妙之義當為除想識無罣礙者不得綺飾衣服不得與世間妻女戲調言語往來報答以致因緣如是者為清淨道人若行不清淨貪利財色或於世俗綺飾衣服互相翹舉但結非惡眄睞所欲輕言戲調未語預笑託己同法口説妙言外似清虛內懷貪惑心存財帛以自供給活於妻子慢佛尊經不復修學反習外道之術世藥解奏符呪厭説療治衆病因緣外道解奏之術或於財帛勾束上下賊意欲得因解奏之術不持吾法當來者却皆由斯輩是故非吾法學弟子也佛言若有女人不能出家在於愛欲之中心樂道者當持五戒月六齋孝順父母姑嫜叔妹夫壻不得撾罵兒子婢使不得輕行來宿止他家不得與世間男子語言調弄譺笑不得妄瞋恚罵詈惡口不得證説他人惡不得陷人兒子妻妾奴婢過惡恆當專精念道為上首不得與世間凡人説法顏貌不得與人男子相斥不得教他人男子不得説世間吉凶善惡災變之相不得憍慢自大晝夜三時燒香稽首三尊悔過十方稟受經行言數自勸不得希望供養貪利財帛不得嫉妬夫主當自賤女人身願為男子轉身受福可得上天宮觀自然是清信女人學道之法若不孝順憍慢姑嫜嫉妬夫主撾罵奴婢造惡自是怨恨恚怒毒意向人行者如是是為非法學女人弟子也佛告諸弟子清慎汝心守護身口恆以四等濟衆生已道寶之慧恩施一切如佛教誡必得度世弟子諸來會者聞佛説經歡喜奉行作禮而去
